<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1200" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0D0D0D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glass" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#2d2000" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#1a1300" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0a0800" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="shine" cx="28%" cy="24%" r="48%">
      <stop offset="0%" stop-color="#D4A017" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4A017" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5a3e08"/>
      <stop offset="30%" stop-color="#D4A017"/>
      <stop offset="50%" stop-color="#F0C040"/>
      <stop offset="70%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#5a3e08"/>
    </linearGradient>
    <linearGradient id="shaft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a3206"/>
      <stop offset="25%" stop-color="#C49A14"/>
      <stop offset="50%" stop-color="#E8B820"/>
      <stop offset="75%" stop-color="#C49A14"/>
      <stop offset="100%" stop-color="#4a3206"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background ambient -->
  <ellipse cx="140" cy="260" rx="90" ry="60" fill="url(#bg)"/>
  <ellipse cx="140" cy="300" rx="65" ry="10" fill="#D4A017" opacity="0.1" filter="url(#glow)"/>

  <!-- GLASS BASE -->
  <path d="M 140 80 C 180 80 215 108 222 148 C 229 185 225 225 212 252 C 200 275 175 285 140 285 C 105 285 80 275 68 252 C 55 225 51 185 58 148 C 65 108 100 80 140 80 Z"
    fill="url(#glass)" stroke="url(#gold)" stroke-width="1.8"/>
  <path d="M 140 80 C 180 80 215 108 222 148 C 229 185 225 225 212 252 C 200 275 175 285 140 285 C 105 285 80 275 68 252 C 55 225 51 185 58 148 C 65 108 100 80 140 80 Z"
    fill="url(#shine)"/>

  <!-- Decorative bands -->
  <path d="M 62 175 C 72 183 100 190 140 190 C 180 190 208 183 218 175" stroke="url(#gold)" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 57 162 C 68 170 98 177 140 177 C 182 177 212 170 223 162" stroke="url(#gold)" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Arabic etching -->
  <g stroke="#D4A017" stroke-width="0.9" fill="none" opacity="0.22">
    <path d="M 140 105 L 152 118 L 140 131 L 128 118 Z"/>
    <circle cx="140" cy="118" r="7"/>
    <path d="M 140 97 L 140 89 M 153 118 L 162 118 M 140 131 L 140 140 M 127 118 L 118 118"/>
    <circle cx="140" cy="118" r="3"/>
    <path d="M 140 215 C 148 210 155 214 154 222 C 154 214 148 212 140 215Z"/>
    <path d="M 140 215 C 132 210 125 214 126 222 C 126 214 132 212 140 215Z"/>
    <circle cx="140" cy="220" r="4"/>
  </g>

  <!-- Gold middle band -->
  <path d="M 62 185 C 75 194 104 200 140 200 C 176 200 205 194 218 185 L 218 192 C 205 201 176 207 140 207 C 104 207 75 201 62 192 Z" fill="url(#gold)" opacity="0.35"/>

  <!-- NECK -->
  <rect x="126" y="52" width="28" height="32" rx="5" fill="url(#shaft)" opacity="0.9"/>
  <rect x="129" y="55" width="22" height="26" rx="4" fill="#0D0D0D" opacity="0.85"/>
  <rect x="126" y="52" width="28" height="6" rx="3" fill="url(#gold)"/>
  <rect x="126" y="78" width="28" height="5" rx="2" fill="url(#gold)" opacity="0.6"/>
  <ellipse cx="140" cy="80" rx="17" ry="6" fill="url(#gold)" opacity="0.85"/>
  <ellipse cx="140" cy="78" rx="13" ry="4" fill="#0D0D0D"/>

  <!-- SHAFT -->
  <rect x="133" y="28" width="14" height="26" rx="7" fill="url(#shaft)"/>
  <rect x="136" y="30" width="5" height="22" rx="2.5" fill="#F0C040" opacity="0.2"/>

  <!-- TRAY/PLATE -->
  <ellipse cx="140" cy="60" rx="0" ry="0"/>

  <!-- BOWL -->
  <path d="M 110 42 C 110 30 120 22 140 22 C 160 22 170 30 170 42 L 163 50 C 158 42 150 38 140 38 C 130 38 122 42 117 50 Z"
    fill="url(#shaft)" stroke="url(#gold)" stroke-width="1.2"/>
  <ellipse cx="140" cy="42" rx="28" ry="12" fill="url(#gold)" opacity="0.7"/>
  <ellipse cx="140" cy="40" rx="22" ry="9" fill="#111"/>
  <ellipse cx="140" cy="38" rx="16" ry="7" fill="#1a0e00"/>
  <!-- Coal ember -->
  <ellipse cx="140" cy="36" rx="10" ry="4" fill="#cc4400" opacity="0.7" filter="url(#glow)"/>
  <ellipse cx="140" cy="35" rx="6" ry="2.5" fill="#ff8c00" opacity="0.5"/>

  <!-- HOSE connector -->
  <ellipse cx="225" cy="155" rx="10" ry="7" fill="url(#shaft)" opacity="0.8" transform="rotate(-8 225 155)"/>
  <ellipse cx="225" cy="155" rx="6" ry="4" fill="#0D0D0D" transform="rotate(-8 225 155)"/>
  <ellipse cx="225" cy="155" rx="6" ry="4" fill="none" stroke="#D4A017" stroke-width="0.8" opacity="0.5" transform="rotate(-8 225 155)"/>

  <!-- Bottom foot -->
  <ellipse cx="140" cy="286" rx="60" ry="9" fill="url(#gold)" opacity="0.8"/>
  <ellipse cx="140" cy="284" rx="54" ry="7" fill="#0D0D0D"/>
  <ellipse cx="140" cy="284" rx="54" ry="7" fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.5"/>
</svg>

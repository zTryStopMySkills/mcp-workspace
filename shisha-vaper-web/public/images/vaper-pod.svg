<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 300" fill="none">
  <defs>
    <linearGradient id="deviceBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="30%" stop-color="#111"/>
      <stop offset="70%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#050500"/>
    </linearGradient>
    <linearGradient id="deviceEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a2900"/>
      <stop offset="30%" stop-color="#D4A017"/>
      <stop offset="50%" stop-color="#F0C040"/>
      <stop offset="70%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#3a2900"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001a2e"/>
      <stop offset="100%" stop-color="#000d14"/>
    </linearGradient>
    <linearGradient id="podGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a1d00"/>
      <stop offset="40%" stop-color="#B8920F"/>
      <stop offset="50%" stop-color="#D4A017"/>
      <stop offset="60%" stop-color="#B8920F"/>
      <stop offset="100%" stop-color="#2a1d00"/>
    </linearGradient>
    <linearGradient id="ledGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A017" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F0C040" stop-opacity="1"/>
      <stop offset="100%" stop-color="#D4A017" stop-opacity="0"/>
    </linearGradient>
    <filter id="screenGlow">
      <feGaussianBlur stdDeviation="2" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ledGlow">
      <feGaussianBlur stdDeviation="3" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ambient glow -->
  <ellipse cx="70" cy="295" rx="35" ry="6" fill="#D4A017" opacity="0.12" filter="url(#ledGlow)"/>

  <!-- Main device body -->
  <rect x="28" y="60" width="84" height="220" rx="12" fill="url(#deviceBody)" stroke="url(#deviceEdge)" stroke-width="1.5"/>

  <!-- Body texture - subtle brushed metal look -->
  <rect x="29" y="61" width="82" height="218" rx="11" fill="none" stroke="rgba(212,160,23,0.06)" stroke-width="0.5"/>

  <!-- Side LED strip — left -->
  <rect x="28" y="120" width="3" height="80" rx="1.5" fill="url(#ledGrad)" opacity="0.8" filter="url(#ledGlow)"/>
  <!-- Side LED strip — right -->
  <rect x="109" y="120" width="3" height="80" rx="1.5" fill="url(#ledGrad)" opacity="0.8" filter="url(#ledGlow)"/>

  <!-- OLED Screen -->
  <rect x="38" y="90" width="64" height="85" rx="6" fill="url(#screenGrad)" filter="url(#screenGlow)"/>
  <rect x="40" y="92" width="60" height="81" rx="5" fill="none" stroke="#D4A017" stroke-width="0.6" opacity="0.4"/>

  <!-- Screen content -->
  <!-- Battery indicator -->
  <rect x="50" y="100" width="30" height="10" rx="2" fill="none" stroke="#D4A017" stroke-width="0.8" opacity="0.6"/>
  <rect x="52" y="102" width="22" height="6" rx="1" fill="#D4A017" opacity="0.5"/>
  <rect x="80" y="103" width="3" height="4" rx="1" fill="#D4A017" opacity="0.4"/>

  <!-- Wattage display -->
  <text x="70" y="125" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#D4A017" opacity="0.85">40W</text>

  <!-- Resistance -->
  <text x="70" y="140" text-anchor="middle" font-family="monospace" font-size="8" fill="#D4A017" opacity="0.5">0.6Ω</text>

  <!-- Puff counter -->
  <text x="70" y="158" text-anchor="middle" font-family="monospace" font-size="7" fill="rgba(212,160,23,0.4)">PUFFS: 248</text>

  <!-- Screen glow effect -->
  <rect x="38" y="90" width="64" height="85" rx="6" fill="#001830" opacity="0.3"/>

  <!-- Fire button — main -->
  <rect x="32" y="195" width="76" height="32" rx="8" fill="#111" stroke="url(#deviceEdge)" stroke-width="1.2"/>
  <rect x="35" y="198" width="70" height="26" rx="6" fill="#0a0a00"/>
  <!-- Button gold ring -->
  <rect x="38" y="201" width="64" height="20" rx="4" fill="none" stroke="#D4A017" stroke-width="0.6" opacity="0.4"/>
  <!-- Button text -->
  <text x="70" y="214" text-anchor="middle" font-family="sans-serif" font-size="8" letter-spacing="3" fill="#D4A017" opacity="0.7">FIRE</text>

  <!-- Up/Down adjustment buttons -->
  <rect x="38" y="235" width="28" height="18" rx="5" fill="#111" stroke="#D4A017" stroke-width="0.8" opacity="0.5"/>
  <text x="52" y="247" text-anchor="middle" font-family="monospace" font-size="12" fill="#D4A017" opacity="0.6">+</text>
  <rect x="74" y="235" width="28" height="18" rx="5" fill="#111" stroke="#D4A017" stroke-width="0.8" opacity="0.5"/>
  <text x="88" y="247" text-anchor="middle" font-family="monospace" font-size="12" fill="#D4A017" opacity="0.6">−</text>

  <!-- USB-C port at bottom -->
  <rect x="56" y="268" width="28" height="8" rx="4" fill="#0D0D0D" stroke="#D4A017" stroke-width="0.8" opacity="0.5"/>
  <rect x="60" y="270" width="20" height="4" rx="2" fill="none" stroke="#D4A017" stroke-width="0.5" opacity="0.3"/>

  <!-- Brand text on body -->
  <text x="70" y="280" text-anchor="middle" font-family="sans-serif" font-size="7" letter-spacing="4" fill="#D4A017" opacity="0.25">SVS</text>

  <!-- Pod cartridge — top -->
  <rect x="35" y="18" width="70" height="50" rx="8" fill="url(#podGrad)" stroke="url(#deviceEdge)" stroke-width="1.2"/>
  <rect x="38" y="21" width="64" height="44" rx="6" fill="#1a1200"/>
  <!-- Pod liquid window -->
  <rect x="45" y="26" width="50" height="30" rx="4" fill="#0D0D0D" stroke="#D4A017" stroke-width="0.6" opacity="0.5"/>
  <!-- Liquid level inside pod -->
  <rect x="46" y="38" width="48" height="17" rx="3" fill="#1a0e00" opacity="0.8"/>
  <rect x="46" y="38" width="48" height="17" rx="3" fill="#D4A017" opacity="0.12"/>
  <!-- Pod text -->
  <text x="70" y="37" text-anchor="middle" font-family="sans-serif" font-size="6" letter-spacing="2" fill="#D4A017" opacity="0.5">POD</text>

  <!-- Mouthpiece at very top -->
  <rect x="47" y="4" width="46" height="18" rx="9" fill="url(#deviceEdge)" opacity="0.8"/>
  <rect x="50" y="6" width="40" height="14" rx="7" fill="#111"/>
  <!-- Mouthpiece opening -->
  <ellipse cx="70" cy="6" rx="12" ry="4" fill="#0D0D0D"/>
  <ellipse cx="70" cy="6" rx="12" ry="4" fill="none" stroke="#D4A017" stroke-width="0.6" opacity="0.4"/>
</svg>
